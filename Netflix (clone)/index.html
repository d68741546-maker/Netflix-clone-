<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clon - Portafolio</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <header class="navbar" id="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo" class="logo">
        <button class="btn-nav">Iniciar Sesión</button>
    </header>

    <section class="banner">
        <div class="banner-contenido">
            <h1 class="banner-titulo">Stranger Things</h1>
            <div class="banner-botones">
                <button class="btn-banner play">▶ Reproducir</button>
                <button class="btn-banner info">ℹ Más Información</button>
            </div>
            <p class="banner-descripcion">
                Cuando un niño desaparece, sus amigos, un jefe de policía y una niña con poderes secretos se ven envueltos en un misterio que involucra experimentos gubernamentales y fuerzas sobrenaturales.
            </p>
        </div>
        <div class="banner-degradado"></div>
    </section>

    <section class="contenedor-fila">
        <h2>Tendencias Ahora</h2>
        <div class="fila-peliculas">
            <div class="tarjeta-pelicula">
                <img src="https://images.unsplash.com/photo-1616530940355-351fabd9524b?q=80&w=400&auto=format&fit=crop" alt="Pelicula 1">
            </div>
            <div class="tarjeta-pelicula">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=400&auto=format&fit=crop" alt="Pelicula 2">
            </div>
            <div class="tarjeta-pelicula">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=400&auto=format&fit=crop" alt="Pelicula 3">
            </div>
            <div class="tarjeta-pelicula">
                <img src="https://images.unsplash.com/photo-1505775561242-727b7fba20f0?q=80&w=400&auto=format&fit=crop" alt="Pelicula 4">
            </div>
            <div class="tarjeta-pelicula">
                <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=400&auto=format&fit=crop" alt="Pelicula 5">
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
